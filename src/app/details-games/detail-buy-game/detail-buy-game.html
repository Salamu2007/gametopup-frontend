<ng-container *ngIf="!isLoading; else loadingSkeleton">
	<section class="detail-buy container" *ngIf="game; else notFound">
		<div class="buy-grid">
			<div class="left">
				<div class="image-wrap">
					<img [src]="getImageUrl()" [alt]="game.name" (error)="onImageError($event)" />
				</div>
				<div class="info">
					<h1>{{ game.name }}</h1>
					<p class="category">{{ game.category }} • {{ game.platform }}</p>
					<p class="desc">{{ game.description }}</p>
				</div>
			</div>

			<aside class="right">
				<div class="price-card">
					<div class="price-row">
						<div class="current">{{ game.price }}</div>
					</div>
					<div class="purchase-form">
						<label>الكمية</label>
						<input type="number" min="1" [(ngModel)]="quantity" />

						<!-- Dynamic Fields -->
						<div *ngFor="let field of game.fields" class="dynamic-field">
							<label>{{ field.label }} <span *ngIf="field.required" class="required">*</span></label>
							
							<input *ngIf="field.type === 'text'" 
							       type="text" 
							       [(ngModel)]="dynamicData[field.name]" 
							       [name]="field.name"
							       [required]="field.required"
							       [placeholder]="field.label" />
							
							<input *ngIf="field.type === 'email'" 
							       type="email" 
							       [(ngModel)]="dynamicData[field.name]" 
							       [name]="field.name"
							       [required]="field.required"
							       [placeholder]="field.label" />
							
							<input *ngIf="field.type === 'number'" 
							       type="number" 
							       [(ngModel)]="dynamicData[field.name]" 
							       [name]="field.name"
							       [required]="field.required"
							       [placeholder]="field.label" />
							
							<textarea *ngIf="field.type === 'textarea'" 
							          [(ngModel)]="dynamicData[field.name]" 
							          [name]="field.name"
							          [required]="field.required"
							          [placeholder]="field.label"
							          rows="3"></textarea>
							
							<select *ngIf="field.type === 'select'" 
							        [(ngModel)]="dynamicData[field.name]" 
							        [name]="field.name"
							        [required]="field.required">
								<option value="" disabled>اختر {{ field.label }}</option>
								<option *ngFor="let option of field.options" [value]="option">{{ option }}</option>
							</select>
							
							<label *ngIf="field.type === 'checkbox'" class="checkbox-container">
								<input type="checkbox" 
								       [(ngModel)]="dynamicData[field.name]" 
								       [name]="field.name"
								       [required]="field.required" />
								{{ field.label }}
							</label>
						</div>

						<label>البريد الإلكتروني</label>
						<input type="email" [(ngModel)]="email" placeholder="your@email.com" />

						<label>رقم الهاتف</label>
						<input type="tel" [(ngModel)]="phone" placeholder="06xxxxxxxx" />

						<label>طريقة الدفع</label>
						<select [(ngModel)]="paymentMethod">
							<option value="ccp">CCP</option>
							<option value="baridimob">BaridiMob</option>
						</select>

						<button class="btn-buy" (click)="buy()" [disabled]="!canBuy || isLoading">
							<span *ngIf="!isLoading">🛒 اشتري الآن</span>
							<span *ngIf="isLoading">⏳ جاري المعالجة...</span>
						</button>

						<div class="msg" *ngIf="message">{{ message }}</div>
					</div>
				</div>
			</aside>
		</div>

		<!-- Success Notification -->
		<div *ngIf="showSuccessNotification" class="success-notification" [@fadeInOut]>
			<div class="notification-content">
				<span class="icon">✅</span>
				<div class="text">
					<h4>{{ successTitle }}</h4>
					<p>{{ successMessage }}</p>
				</div>
				<button (click)="closeNotification()" class="close-btn">×</button>
			</div>
		</div>
	</section>
</ng-container>

<ng-template #loadingSkeleton>
	<section class="detail-buy container skeleton-page">
		<div class="buy-grid">
			<div class="left">
				<div class="image-wrap skeleton-box skeleton-image"></div>
				<div class="info">
					<div class="skeleton-box skeleton-title"></div>
					<div class="skeleton-box skeleton-subtitle"></div>
					<div class="skeleton-box skeleton-paragraph"></div>
					<div class="skeleton-box skeleton-paragraph short"></div>
				</div>
			</div>

			<aside class="right">
				<div class="price-card">
					<div class="skeleton-box skeleton-price-large"></div>
					<div class="purchase-form">
						<div class="skeleton-box skeleton-input"></div>
						<div class="skeleton-box skeleton-input"></div>
						<div class="skeleton-box skeleton-input"></div>
						<div class="skeleton-box skeleton-input"></div>
						<div class="skeleton-box skeleton-button"></div>
					</div>
				</div>
			</aside>
		</div>
	</section>
</ng-template>

<ng-template #notFound>
	<div class="notfound">اللعبة غير موجودة</div>
</ng-template>
